<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>

  <!-- Neural network connections (background) -->
  <line x1="8" y1="16" x2="22" y2="8"  stroke="#1d4ed8" stroke-width="1"   opacity="0.35"/>
  <line x1="8" y1="16" x2="22" y2="24" stroke="#1d4ed8" stroke-width="1"   opacity="0.35"/>
  <line x1="22" y1="8"  x2="22" y2="24" stroke="#1d4ed8" stroke-width="1"   opacity="0.35"/>

  <!-- Main connections (foreground) -->
  <line x1="8"  y1="16" x2="16" y2="16" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="22" y2="8"  stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="22" y2="24" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Outer nodes -->
  <circle cx="8"  cy="16" r="2.8" fill="#1d4ed8"/>
  <circle cx="22" cy="8"  r="2.8" fill="#1d4ed8"/>
  <circle cx="22" cy="24" r="2.8" fill="#1d4ed8"/>

  <!-- Centre node (brighter) -->
  <circle cx="16" cy="16" r="2.2" fill="#60a5fa"/>
  <circle cx="16" cy="16" r="1"   fill="#bfdbfe"/>
</svg>
